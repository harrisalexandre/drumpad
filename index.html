<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Drum Pad</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:20px;
      background:#111;
    }

    .pad{
      width:220px;
      height:220px;
      border:none;
      border-radius:30px;
      color:white;
      font-size:2rem;
      font-weight:bold;
      cursor:pointer;
      transition:0.1s;
      box-shadow:
        0 10px 30px rgba(0,0,0,0.4),
        inset 0 2px 8px rgba(255,255,255,0.2);
    }

    .fah{
      background:linear-gradient(145deg,#ff3c3c,#b30000);
    }

    .wow{
      background:linear-gradient(145deg,#3c8cff,#003db3);
    }

    .among{
      background:linear-gradient(145deg,#00c76f,#007a44);
    }

    .pad:active{
      transform:scale(0.95);
      filter:brightness(1.2);
    }
  </style>
</head>
<body>

  <button class="pad fah" onclick="tocar('fah')">
    FAHH
  </button>

  <button class="pad wow" onclick="tocar('wow')">
    WOW
  </button>

  <button class="pad among" onclick="tocar('among')">
    AMONG US
  </button>

  <audio id="fah" src="fah.mp3"></audio>
  <audio id="wow" src="wow.mp3"></audio>
  <audio id="among" src="among-us.mp3"></audio>

  <script>
    function tocar(id) {
      const audio = document.getElementById(id);
      audio.currentTime = 0;
      audio.play();
    }

    document.addEventListener("keydown", (e) => {
      if (e.code === "Space") {
        tocar("fah");
      }

      if (e.key.toLowerCase() === "w") {
        tocar("wow");
      }

      if (e.key.toLowerCase() === "a") {
        tocar("among");
      }
    });
  </script>

</body>
</html>
