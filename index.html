<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Drum Pad</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background:#111;
    }

    .pad{
      width:320px;
      height:320px;
      border:none;
      border-radius:30px;
      background:linear-gradient(145deg,#ff3c3c,#b30000);
      color:white;
      font-size:2rem;
      font-weight:bold;
      cursor:pointer;
      box-shadow:
        0 10px 30px rgba(0,0,0,0.4),
        inset 0 2px 8px rgba(255,255,255,0.2);
      transition:0.1s;
    }

    .pad:active{
      transform:scale(0.95);
      filter:brightness(1.2);
    }
  </style>
</head>
<body>

  <button class="pad" id="drumPad">
    FAHH
  </button>

  <audio id="audio" src="fah.mp3"></audio>

  <script>
    const pad = document.getElementById("drumPad");
    const audio = document.getElementById("audio");

    function tocarSom() {
      audio.currentTime = 0;
      audio.play();
    }

    pad.addEventListener("click", tocarSom);

    // tecla espaço
    document.addEventListener("keydown", (e) => {
      if(e.code === "Space"){
        tocarSom();
      }
    });
  </script>

</body>
</html>
